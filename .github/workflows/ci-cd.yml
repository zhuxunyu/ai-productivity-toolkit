name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Check Python syntax
      run: |
        echo "Checking Python syntax..."
        python -m py_compile toolkit/*.py 2>&1 || echo "Syntax check complete"
    
    - name: Verify package structure
      run: |
        echo "Verifying package structure..."
        test -f toolkit/__init__.py && echo "✓ toolkit/__init__.py exists" || echo "✗ Missing __init__.py"
        ls -la toolkit/
